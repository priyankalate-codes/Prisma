<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FormatFlow — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #212121;
            --surface: #2f2f2f;
            --border: #3a3a3a;
            --text: #ececec;
            --muted: #8e8ea0;
            --accent: #33ccff;
            --accent-dim: rgba(51, 204, 255, 0.15);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 36px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-icon {
            width: 52px;
            height: 52px;
            background: var(--accent-dim);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--accent);
            margin: 0 auto 16px;
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .brand p {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 4px;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 6px;
            letter-spacing: 0.03em;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap > i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.95rem;
            pointer-events: none;
            z-index: 2;
        }

        /* Generic input styling within the wrap to handle type="text" toggles */
        .input-wrap input {
            width: 100%;
            padding: 11px 12px 11px 36px;
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        input::placeholder {
            color: #55555a;
        }

        .pw-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.95rem;
            padding: 0;
            z-index: 3;
        }

        .pw-toggle:hover {
            color: var(--text);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover:not(:disabled) {
            opacity: 0.88;
        }

        .submit-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.83rem;
            margin-top: 14px;
            display: none;
        }

        .alert-error {
            background: rgba(192, 57, 43, 0.15);
            color: #e06c75;
            border: 1px solid rgba(192, 57, 43, 0.3);
        }

        .alert-success {
            background: rgba(51, 204, 255, 0.12);
            color: var(--accent);
            border: 1px solid rgba(51, 204, 255, 0.3);
        }

        .footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.72rem;
            color: #44444a;
        }

        /* Spinner */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="brand">
            <div class="brand-icon"><i class="bi bi-stars"></i></div>
            <h1>FormatFlow</h1>
            <p>Document Intelligence Platform</p>
        </div>

        <form id="loginForm" autocomplete="on">
            <div class="field">
                <label for="email">Email address</label>
                <div class="input-wrap">
                    <i class="bi bi-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="you@company.com" required
                        autocomplete="email">
                </div>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="password" name="password" placeholder="••••••••" required
                        autocomplete="current-password">
                    <button type="button" class="pw-toggle" onclick="togglePw()" title="Show/hide password">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="alert alert-error" id="errorMsg"></div>
            <div class="alert alert-success" id="successMsg"></div>

            <button type="submit" class="submit-btn" id="loginBtn">
                Sign in
            </button>
        </form>

        <div class="footer">Confidential &copy; 2026 CODES-FormatFlow</div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const apiFetch = (input, init = {}) => fetch(input, {
            ...init,
            credentials: 'include'
        });

        function togglePw() {
            const pw = document.getElementById('password');
            const ic = document.getElementById('eyeIcon');
            if (pw.type === 'password') {
                pw.type = 'text';
                ic.className = 'bi bi-eye-slash';
            } else {
                pw.type = 'password';
                ic.className = 'bi bi-eye';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<div class="spinner"></div> Signing in…';

            try {
                const res = await apiFetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value,
                    }),
                    credentials: 'include'
                });

                const data = await res.json();

                if (data.success) {
                    successMsg.textContent = 'Access granted — redirecting…';
                    successMsg.style.display = 'block';
                    setTimeout(() => window.location.replace('/'), 700);
                } else {
                    throw new Error(data.error || 'Invalid credentials');
                }
            } catch (err) {
                errorMsg.textContent = err.message === 'Failed to fetch' 
                    ? 'Cannot connect to server. Please try again.' 
                    : err.message;
                errorMsg.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Sign in';
            }
        });
    </script>
</body>

</html>
